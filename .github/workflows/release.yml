name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            linker: gcc-aarch64-linux-gnu

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install nightly toolchain
        run: |
          rustup toolchain install nightly --component rust-src
          rustup default nightly
          rustup target add ${{ matrix.target }}

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Install cross-compilation linker
        if: matrix.linker
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.linker }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/vtether vtether-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: vtether-linux-${{ matrix.arch }}
          path: vtether-linux-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            vtether-linux-amd64/vtether-linux-amd64 \
            vtether-linux-arm64/vtether-linux-arm64 \
            --repo ${{ github.repository }} \
            --generate-notes
